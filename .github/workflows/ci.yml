name: cask
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Link the checkout as a Homebrew tap
        run: |
          tap="$(brew --repository)/Library/Taps/navnit/homebrew-gapless"
          mkdir -p "$(dirname "$tap")"
          ln -sfn "$GITHUB_WORKSPACE" "$tap"
      - run: brew style --cask navnit/gapless/gapless
      - run: brew audit --cask --strict --online navnit/gapless/gapless
      - run: brew install --cask navnit/gapless/gapless
      - run: test -d "/Applications/Gapless.app"
      - run: brew uninstall --cask navnit/gapless/gapless
